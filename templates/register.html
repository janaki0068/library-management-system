{% load static %}

<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Register</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="{% static 'css/register.css' %}" />

</head>

<body>

    <div class="container">

        <!-- LEFT PANEL -->
        <div class="left-panel">

            <!-- LOGO -->
            <div class="logo-section">

                <img src="{% static 'images/liblogo.jpg' %}"
                     alt="Logo" />

            </div>

            <!-- IMAGE -->
            <div class="book-image">

                <img src="{% static 'images/loginbook.png' %}"
                     alt="Books" />

            </div>

            <!-- TEXT -->
            <div class="community-text">

                <h2>
                    Join Our Library Community
                </h2>

                <p>
                    Login to continue your journey with smart library,
                    smart learning
                </p>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">

            <h1>Register</h1>

            <p class="subtitle">
                Fill in the details to register
            </p>

            <!-- FORM -->
            <form method="POST">

                {% csrf_token %}

                <div class="form-grid">

                    <!-- FULL NAME -->
                    <div class="form-group">

                        <label for="full-name">
                            Full Name
                        </label>

                        <div class="input-wrapper">

                            <input type="text"
                                   id="full-name"
                                   name="full_name"
                                   required
                                   placeholder="Enter your full name" />

                        </div>

                    </div>

                    <!-- EMAIL -->
                    <div class="form-group">

                        <label for="email">
                            Email
                        </label>

                        <div class="input-wrapper">

                            <input type="email"
                                   id="email"
                                   name="email"
                                   required
                                   placeholder="Enter your email" />

                        </div>

                    </div>

                    <!-- USERNAME -->
                    <div class="form-group">

                        <label for="username">
                            Username
                        </label>

                        <div class="input-wrapper">

                            <input type="text"
                                   id="username"
                                   name="username"
                                   required
                                   placeholder="Enter your username" />

                        </div>

                    </div>

                    <!-- PHONE -->
                    <div class="form-group">

                        <label for="phone-number">
                            Phone Number
                        </label>

                        <div class="input-wrapper">

                            <input type="tel"
                                   id="phone-number"
                                   name="phone"
                                   required
                                   placeholder="Enter your phone number" />

                        </div>

                    </div>

                    <!-- STUDENT ID -->
                    <div class="form-group">

                        <label for="student-id">
                            Student ID
                        </label>

                        <div class="input-wrapper">

                            <input type="text"
                                   id="student-id"
                                   name="student_id"
                                   required
                                   placeholder="Enter your student ID" />

                        </div>

                    </div>

                    <!-- DOB -->
                    <div class="form-group">

                        <label for="dob">
                            Date of Birth
                        </label>

                        <input type="date"
                               id="dob"
                               name="dob"
                               required />

                    </div>

                    <!-- PASSWORD -->
                    <div class="form-group">

                        <label for="password">
                            Password
                        </label>

                        <input type="password"
                               id="password"
                               name="password"
                               required
                               placeholder="Enter your password" />

                    </div>

                    <!-- CONFIRM PASSWORD -->
                    <div class="form-group">

                        <label for="confirm-password">
                            Confirm Password
                        </label>

                        <input type="password"
                               id="confirm-password"
                               name="confirm_password"
                               required
                               placeholder="Confirm your password" />

                    </div>

                    <!-- ROLE -->
                    <div class="form-group">

                        <label for="role">

                            <p>Select Role</p>

                            <select id="role"
                                    name="role"
                                    required>

                                <option value="">
                                    Choose your role
                                </option>

                                <option value="student">
                                    Student
                                </option>

                                <option value="admin">
                                    Admin
                                </option>

                            </select>

                        </label>

                    </div>

                </div>

                <!-- CHECKBOX -->
                <div class="checkbox-group">

                    <label for="checkbox">

                        <input type="checkbox"
                               id="checkbox"
                               required />

                        I agree to the Terms and Conditions

                    </label>

                </div>

                <!-- FOOTER -->
                <div class="form-footer">

                    <p class="register">

                        Already have an account?

                        <a href="/login/">
                            Login
                        </a>

                    </p>

                    <button type="submit"
                            class="reg-btn">

                        Register

                    </button>

                </div>

            </form>

        </div>

    </div>

</body>

</html>
