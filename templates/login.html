{% extends 'base.html' %} {% load static %} {% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}" />

<div class="back-link">
  <a href="{% url 'home' %}">Return Home</a>
</div>
<div class="login-container">
  <div class="login-left-panel">
    <div class="logo-section">
      <img src="{% static 'images/liblogo.jpg' %}" />
    </div>
    <div class="book-image">
      <img src="{% static 'images/loginbook.png' %}" />
    </div>
    <div class="community-text">
      <h2>Join Our Library Community</h2>
      <p>Login to continue your journey with smart library, smart learning</p>
    </div>
  </div>
  <div class="login-right-panel">
    <h1>Login</h1>
    <p class="subtitle">Enter your credentials to access your account</p>
    <form action="">
      <label for="username">Username or Email</label>
      <input type="text" id="username" />

      <label for="password">Password</label>
      <input type="password" id="password" />

      <div class="options">
        <label class="remember-me">
          <input type="checkbox" id="remember-me" />
          Remember me
        </label>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn">Login</button>
    </form>
    <p class="register">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
  </div>
</div>
{% endblock %}
