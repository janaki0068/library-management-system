<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="logo-section">
                <img src="../assets/images/liblogo.jpg" alt="Library Logo">
            </div>
            <div class="book-image">
                <img src="../assets/images/loginbook.png" alt="Book Image">
            </div>
            <div class="community-text">
                <h2>Join Our Library Community</h2>
                <p>Login to continue your journey with smart library, smart learning</p>
            </div>
        </div>
        <div class="right-panel">
            <h1>Login</h1>
            <p class="subtitle">
                Enter your credentials to access your account
            </p>
            <form action="">
                <label for="username">Username or Email</label>
                <input type="text" id="username">

                <label for="">Password</label>
                <input type="password">

                <div class="options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember-me">
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <p class="register">Don't have an account? <a href="#">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
